<!DOCTYPE html>
<html lang ="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shit store</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="top-bar">

        <div>Бесплатная доставка</div>

        <div>Никакого возврата</div>
        
        <div>Премиальное качество</div>

    </div>

    <header>

        <div class="container">

            <h1 class="logo">Shit store</h1>

            <nav>

                <ul>

                    <li><a href="#">Каталог</a></li>
                    <li><a href="#">Новинки</a></li>               
                    <li><a href="#">Мужчинам</a></li>
                    <li><a href="#">Женщинам</a></li>
                    <li><a href="#">Распродажа</a></li>
                    <li><a href="#">О нас</a></li>

                </ul>

            </nav>

            <div class="header-icons">

                <span>🔍</span>
                <span>👤</span>
                <span>🛍️</span>

            </div>

        </div>

    </header>

    <main>

        <section class="hero">

            <div class="hero-container">

                <div class="hero-content">

                    <h2>
                        Тупо
                        <br>
                        Дешево
                        <br>
                        Обрыгано
                    </h2>

                    <p class="hero-description">
                        Тупой шмот
                        <br>
                        для дешевой жизни
                        <br>
                        который не жалко обрыгать
                    </p>

                    <a href="#" class="hero-button">
                        Смотреть каталог
                    </a>

                    <div class="hero-slider">

                        <span class="active">01</span>
                        <span></span>
                        <span>02</span>
                        <span></span>
                        <span>03</span>

                    </div>

                </div>

                <div class="hero-image">

                    <img src="img/hero.jpg" alt="hero image">

                </div>

            </div>

        </section>

    </main>

</body>

</html>
